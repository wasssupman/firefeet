lunch_block_start: "1200"
lunch_block_end:   "1330"

strategies:
  - name: orb
    active_times:
      - {start: "0900", end: "0930"}
    temperatures: any
    signal_weights:
      vwap_reversion:      5
      orderbook_pressure: 20
      momentum_burst:     40
      volume_surge:       25
      micro_trend:        10
    confidence_threshold: 0.25
    take_profit:  0.8
    stop_loss:   -0.5
    max_hold_seconds: 180

  - name: momentum_scalp
    active_times:
      - {start: "0930", end: "1200"}
      - {start: "1330", end: "1520"}
    temperatures: [HOT, WARM, NEUTRAL]
    signal_weights:
      vwap_reversion:     10
      orderbook_pressure: 20
      momentum_burst:     35
      volume_surge:       25
      micro_trend:        10
    confidence_threshold: 0.22
    take_profit:  0.8
    stop_loss:   -0.5
    max_hold_seconds: 180

  - name: vwap_reversion
    active_times:
      - {start: "1030", end: "1200"}
      - {start: "1330", end: "1430"}
    temperatures: [NEUTRAL, COOL, COLD]
    signal_weights:
      vwap_reversion:     40
      orderbook_pressure: 30
      momentum_burst:     15
      volume_surge:       10
      micro_trend:         5
    confidence_threshold: 0.20
    take_profit:  0.7
    stop_loss:   -0.4
    max_hold_seconds: 180

adaptive:
  name: adaptive
  signal_weights:
    vwap_reversion:     25
    orderbook_pressure: 25
    momentum_burst:     20
    volume_surge:       15
    micro_trend:        15
  confidence_threshold: 0.20
  take_profit:  0.7
  stop_loss:   -0.4
  max_hold_seconds: 180
