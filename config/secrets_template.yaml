# Korea Investment & Securities (KIS) API Credentials
# Get these from: https://apiportal.koreainvestment.com/
# Copy this file to 'secrets.yaml' and fill in your keys.

CANO: "YOUR_ACCOUNT_NUMBER_PREFIX_8_DIGITS" # 계좌번호 앞 8자리
ACNT_PRDT_CD: "01" # 계좌번호 뒤 2자리 (보통 01)

# Real Trading (실전투자)
PROD:
  APP_KEY: "YOUR_PROD_APP_KEY"
  APP_SECRET: "YOUR_PROD_APP_SECRET"
  URL_BASE: "https://openapi.koreainvestment.com:9443"

# Paper Trading (모의투자)
PAPER:
  APP_KEY: "YOUR_PAPER_APP_KEY"
  APP_SECRET: "YOUR_PAPER_APP_SECRET"
  URL_BASE: "https://openapivts.koreainvestment.com:29443"

# Common Settings
DISCORD_WEBHOOK_URL: ""
SLACK_WEBHOOK_URL: ""

# DART OpenAPI (https://opendart.fss.or.kr)
DART_API_KEY: ""

# Anthropic Claude API
ANTHROPIC_API_KEY: ""
